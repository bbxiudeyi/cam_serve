<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>视频流</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #ffffff;
            color: #1f2937;
            padding: 24px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 16px;
        }
        /* 控制栏:开始 / 停止按钮 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .toolbar button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .toolbar button:hover { background: #2ea043; }
        .toolbar button.stop {
            background: #da3633;
        }
        .toolbar button.stop:hover { background: #f85149; }
        /* 状态栏 */
        .status {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 16px;
            min-height: 20px;
        }
        .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .status.connecting .dot { background: #f59e0b; }
        .status.online .dot { background: #22c55e; }
        .status.offline .dot { background: #ef4444; }
        /* 画面区域 */
        .stage {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            min-height: 240px;
            min-width: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .stage canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>视频流</h1>

    <div class="status" id="status"><span class="dot"></span><span class="text">未连接</span></div>

    <div class="toolbar">
        <button id="startBtn">▶ 开始</button>
        <button id="stopBtn" class="stop">■ 停止</button>
    </div>

    <div class="stage">
        <canvas id="video"></canvas>
    </div>

    <script>
        // ============ 后端视频流服务地址 ============
        // cam-stream.exe 监听的地址(WebSocket 端点)。如果 cam-stream 跑在别的机器/端口,改这里。
        const WS_BACKEND = 'ws://localhost:3000';

        // 自动重连参数
        const RECONNECT_INTERVAL = 3000;   // 重连尝试间隔(毫秒)
        const MAX_FAST_RETRIES = 5;        // 快速重连次数,超过后改用慢速
        const SLOW_RECONNECT_INTERVAL = 5000;

        const canvas = document.getElementById('video');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusEl = document.getElementById('status');
        const statusText = statusEl.querySelector('.text');
        let ws = null;
        let reconnectTimer = null;
        let retryCount = 0;
        // 区分"用户主动停止"和"意外断开":
        //   true  = 用户点了停止 → 不重连
        //   false = 在跑过程中断了 → 自动重连
        let userStopped = true;

        // 更新状态栏样式 + 文字。level: 'connecting' | 'online' | 'offline'
        function setStatus(level, text) {
            statusEl.className = 'status ' + level;
            statusText.textContent = text;
        }

        // 显示一帧 JPEG 到 canvas
        function drawFrame(bytes) {
            const blob = new Blob([bytes], { type: 'image/jpeg' });
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
                if (canvas.width !== img.width || canvas.height !== img.height) {
                    canvas.width = img.width;
                    canvas.height = img.height;
                }
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        // 真正建立 WebSocket 连接。被 start() 和重连定时器复用。
        function connect() {
            // 清掉可能残留的重连定时器
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

            if (retryCount === 0) {
                setStatus('connecting', '正在连接视频流后端…');
            } else {
                setStatus('connecting', `后端未响应,重连中(${retryCount})…`);
            }

            try {
                ws = new WebSocket(WS_BACKEND + '/ws');
            } catch (e) {
                // new WebSocket 抛异常(如地址非法),走重连流程
                scheduleReconnect();
                return;
            }
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                retryCount = 0;
                setStatus('online', '已连接,正在接收画面');
            };

            ws.onmessage = (e) => {
                if (typeof e.data !== 'string') {
                    drawFrame(e.data);   // 二进制 = 一帧 JPEG
                }
                // text 消息是后端的 stats(fps/seq),目前不展示,直接忽略
            };

            // 意外关闭/onerror:只要不是用户主动停止,就自动重连
            ws.onclose = () => {
                ws = null;
                if (userStopped) return;          // 用户主动停的,不重连
                scheduleReconnect();
            };
            ws.onerror = () => {
                // onerror 后通常会跟一个 onclose,重连逻辑放 onclose 里统一处理
            };
        }

        // 安排一次重连。前 MAX_FAST_RETRIES 次快速,之后改慢速,避免狂连。
        function scheduleReconnect() {
            retryCount += 1;
            const wait = retryCount <= MAX_FAST_RETRIES
                ? RECONNECT_INTERVAL
                : SLOW_RECONNECT_INTERVAL;
            setStatus('connecting', `后端未响应,${Math.round(wait / 1000)} 秒后重连(${retryCount})…`);
            reconnectTimer = setTimeout(connect, wait);
        }

        // 开始:用户主动发起连接
        function start() {
            if (ws) return;            // 已在运行
            userStopped = false;
            retryCount = 0;
            connect();
        }

        // 停止:用户主动停止,清画面 + 不再重连
        function stop() {
            userStopped = true;
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            if (ws) { ws.close(); ws = null; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setStatus('offline', '已停止');
        }

        startBtn.addEventListener('click', start);
        stopBtn.addEventListener('click', stop);
    </script>
</body>
</html>
